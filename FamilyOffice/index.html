<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FO Cash"/>
<meta name="theme-color" content="#d4a827"/>
<title>Family Office</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --gold-100: #f5e6b8;
  --gold-200: #e8c96a;
  --gold-300: #d4a827;
  --gold-400: #b8891a;
  --black: #080808;
  --black-soft: #161616;
  --glass: rgba(10,9,6,0.6);
  --glass-border: rgba(212,168,39,0.2);
  --glass-border-hover: rgba(212,168,39,0.45);
  --text: #f0e6c8;
  --text-muted: rgba(240,230,200,0.5);
  --text-dim: rgba(240,230,200,0.3);
  --ok: #4ade80;
  --danger: #f87171;
  --radius: 16px;
  --radius-sm: 10px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --font-d: 'Cormorant Garamond', Georgia, serif;
  --font-b: 'Montserrat', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--black); font-family: var(--font-b); color: var(--text); }

/* ── BACKGROUND ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 20% 20%, rgba(184,137,26,0.12) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(212,168,39,0.07) 0%, transparent 50%);
  pointer-events: none;
}

/* ── APP SHELL ── */
#app { position: fixed; inset: 0; z-index: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── SCREENS ── */
.screen { position: absolute; inset: 0; display: flex; flex-direction: column; overflow: hidden; opacity: 0; pointer-events: none; transform: translateX(30px); transition: opacity 0.28s ease, transform 0.28s ease; }
.screen.active { opacity: 1; pointer-events: all; transform: translateX(0); }
.screen.slide-back { transform: translateX(-30px); }

/* ── HEADER ── */
.pwa-header {
  padding: calc(var(--safe-top) + 18px) 20px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 0.5px solid var(--glass-border);
  background: rgba(8,8,8,0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  flex-shrink: 0;
}
.pwa-header-title { font-family: var(--font-d); font-size: 24px; font-weight: 400; color: var(--gold-200); letter-spacing: 0.04em; }
.pwa-header-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; margin-top: 2px; }
.pwa-back { background: none; border: 0.5px solid var(--glass-border); border-radius: 50%; width: 36px; height: 36px; color: var(--gold-200); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* ── SCROLL AREA ── */
.pwa-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px 16px calc(var(--safe-bottom) + 90px); }

/* ── GLASS CARD ── */
.glass {
  background: var(--glass);
  backdrop-filter: blur(18px) saturate(1.3);
  -webkit-backdrop-filter: blur(18px) saturate(1.3);
  border: 0.5px solid var(--glass-border);
  border-radius: var(--radius);
}

/* ── METRIC CARDS ── */
.pwa-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.pwa-metric { padding: 16px; position: relative; overflow: hidden; }
.pwa-metric.full { grid-column: 1/-1; }
.pwa-metric::before { content: ''; position: absolute; top: 0; left: 0; width: 2px; height: 100%; background: linear-gradient(180deg, var(--gold-200), transparent); opacity: 0.6; }
.pwa-metric-label { font-size: 9px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
.pwa-metric-value { font-family: var(--font-d); font-size: 22px; font-weight: 400; color: var(--gold-100); line-height: 1; }
.pwa-metric-sub { font-size: 9px; color: var(--text-dim); margin-top: 4px; }

/* ── PENDING BADGE ── */
.pwa-pending-btn {
  width: 100%; padding: 14px 18px; margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; border: none; text-align: left;
  background: rgba(184,137,26,0.1);
  border: 0.5px solid rgba(184,137,26,0.35);
  border-radius: var(--radius-sm);
}
.pwa-pending-label { font-size: 12px; color: var(--gold-200); letter-spacing: 0.06em; }
.pwa-pending-count { font-family: var(--font-d); font-size: 22px; color: var(--gold-300); font-weight: 500; }

/* ── FAB ── */
.pwa-fab {
  position: fixed;
  right: 20px;
  bottom: calc(var(--safe-bottom) + 24px);
  width: 58px; height: 58px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-300), var(--gold-400));
  border: none;
  font-size: 28px; color: var(--black);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 24px rgba(212,168,39,0.35);
  z-index: 100;
  transition: transform 0.15s ease;
}
.pwa-fab:active { transform: scale(0.93); }

/* ── FORM ── */
.pwa-form { display: flex; flex-direction: column; gap: 14px; }
.pwa-field { display: flex; flex-direction: column; gap: 6px; }
.pwa-label { font-size: 9px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); }
.pwa-input {
  background: rgba(255,255,255,0.05);
  border: 0.5px solid var(--glass-border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-b);
  font-size: 15px;
  padding: 13px 14px;
  width: 100%;
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.2s;
}
.pwa-input:focus { border-color: var(--gold-300); }
.pwa-input option { background: #1a1a0e; color: var(--text); }

/* ── TYPE TOGGLE ── */
.pwa-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-radius: var(--radius-sm); overflow: hidden; border: 0.5px solid var(--glass-border); }
.pwa-toggle-btn { padding: 13px; border: none; background: transparent; color: var(--text-muted); font-family: var(--font-b); font-size: 13px; font-weight: 500; letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s; }
.pwa-toggle-btn.active.income { background: rgba(74,222,128,0.15); color: var(--ok); }
.pwa-toggle-btn.active.expense { background: rgba(248,113,113,0.15); color: var(--danger); }

/* ── SUBMIT BTN ── */
.pwa-submit {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, var(--gold-300), var(--gold-400));
  border: none; border-radius: var(--radius-sm);
  color: var(--black); font-family: var(--font-b);
  font-size: 13px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; margin-top: 6px;
  transition: opacity 0.2s;
}
.pwa-submit:active { opacity: 0.85; }
.pwa-submit:disabled { opacity: 0.4; }

/* ── HISTORY LIST ── */
.pwa-entry {
  padding: 14px 16px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
}
.pwa-entry-left { flex: 1; min-width: 0; }
.pwa-entry-date { font-size: 10px; color: var(--text-muted); letter-spacing: 0.06em; margin-bottom: 3px; }
.pwa-entry-desc { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pwa-entry-cat { display: inline-block; font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 7px; border-radius: 99px; margin-top: 4px; background: rgba(212,168,39,0.12); color: var(--gold-200); border: 0.5px solid rgba(212,168,39,0.25); }
.pwa-entry-right { text-align: right; flex-shrink: 0; }
.pwa-entry-amount { font-family: var(--font-d); font-size: 18px; font-weight: 500; }
.pwa-entry-amount.income { color: var(--ok); }
.pwa-entry-amount.expense { color: var(--danger); }
.pwa-entry-status { font-size: 9px; margin-top: 3px; letter-spacing: 0.08em; }
.status-pending  { color: var(--gold-200); }
.status-approved { color: var(--ok); }
.status-rejected { color: var(--danger); }

/* ── TOAST ── */
.pwa-toast {
  position: fixed; bottom: calc(var(--safe-bottom) + 100px); left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(20,18,10,0.95); border: 0.5px solid var(--glass-border);
  border-radius: var(--radius-sm); padding: 12px 20px;
  font-size: 12px; color: var(--text); letter-spacing: 0.04em;
  opacity: 0; transition: all 0.3s ease; pointer-events: none;
  white-space: nowrap; z-index: 200;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.pwa-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── OFFLINE BAR ── */
.pwa-offline {
  background: rgba(184,137,26,0.15); border-bottom: 0.5px solid rgba(184,137,26,0.3);
  padding: 8px 16px; font-size: 11px; color: var(--gold-200);
  text-align: center; letter-spacing: 0.06em;
  display: none;
}
.pwa-offline.show { display: block; }

/* ── EMPTY STATE ── */
.pwa-empty { text-align: center; padding: 48px 24px; color: var(--text-dim); font-size: 13px; letter-spacing: 0.06em; }

/* ── SECTION LABEL ── */
.pwa-section-label { font-size: 9px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; margin-top: 4px; }

/* ── LOADING ── */
.pwa-loading { text-align: center; padding: 32px; color: var(--text-muted); font-size: 12px; letter-spacing: 0.1em; }
</style>
</head>
<body>

<div id="offline-bar" class="pwa-offline">Sem conexão — lançamentos serão sincronizados ao reconectar</div>

<div id="app">

  <!-- ═══ SCREEN 1: DASHBOARD ═══ -->
  <div class="screen active" id="screen-dashboard">
    <div class="pwa-header">
      <div>
        <div class="pwa-header-title">Family Office</div>
        <div class="pwa-header-sub" id="header-date"></div>
      </div>
    </div>
    <div class="pwa-scroll">
      <div class="pwa-section-label">Resumo do mês</div>
      <div class="pwa-metrics">
        <div class="pwa-metric glass full">
          <div class="pwa-metric-label">Total lançado</div>
          <div class="pwa-metric-value" id="m-total">R$ 0</div>
          <div class="pwa-metric-sub">entradas aprovadas</div>
        </div>
        <div class="pwa-metric glass">
          <div class="pwa-metric-label">Receitas</div>
          <div class="pwa-metric-value" id="m-income" style="color:#4ade80">R$ 0</div>
        </div>
        <div class="pwa-metric glass">
          <div class="pwa-metric-label">Despesas</div>
          <div class="pwa-metric-value" id="m-expense" style="color:#f87171">R$ 0</div>
        </div>
      </div>

      <button class="pwa-pending-btn glass" id="btn-pending" onclick="goTo('screen-history')">
        <div>
          <div class="pwa-pending-label">Aguardando aprovação</div>
          <div style="font-size:10px; color:var(--text-dim); margin-top:2px;">Toque para ver o histórico</div>
        </div>
        <div class="pwa-pending-count" id="pending-count">0</div>
      </button>

      <div class="pwa-section-label">Últimos lançamentos</div>
      <div id="recent-list"><div class="pwa-loading">Carregando...</div></div>
    </div>
    <button class="pwa-fab" onclick="goTo('screen-new')">+</button>
  </div>

  <!-- ═══ SCREEN 2: NOVO LANÇAMENTO ═══ -->
  <div class="screen" id="screen-new">
    <div class="pwa-header">
      <div>
        <div class="pwa-header-title">Novo Lançamento</div>
        <div class="pwa-header-sub">Fluxo de caixa</div>
      </div>
      <button class="pwa-back" onclick="goBack()">‹</button>
    </div>
    <div class="pwa-scroll">
      <div class="glass" style="padding:20px">
        <div class="pwa-form" id="entry-form">

          <div class="pwa-field">
            <label class="pwa-label">Tipo</label>
            <div class="pwa-toggle">
              <button class="pwa-toggle-btn active expense" id="btn-expense" onclick="setType('expense')">Despesa</button>
              <button class="pwa-toggle-btn income" id="btn-income" onclick="setType('income')">Receita</button>
            </div>
          </div>

          <div class="pwa-field">
            <label class="pwa-label">Valor (R$)</label>
            <input class="pwa-input" type="number" id="f-amount" inputmode="decimal" placeholder="0,00" step="0.01" min="0"/>
          </div>

          <div class="pwa-field">
            <label class="pwa-label">Descrição</label>
            <input class="pwa-input" type="text" id="f-desc" placeholder="Ex: Supermercado, Salário..."/>
          </div>

          <div class="pwa-field">
            <label class="pwa-label">Data</label>
            <input class="pwa-input" type="date" id="f-date"/>
          </div>

          <div class="pwa-field">
            <label class="pwa-label">Categoria</label>
            <select class="pwa-input" id="f-category">
              <option value="">Selecione...</option>
              <option>Alimentação</option>
              <option>Moradia</option>
              <option>Transporte</option>
              <option>Saúde</option>
              <option>Educação</option>
              <option>Lazer</option>
              <option>Viagem</option>
              <option>Investimento</option>
              <option>Receita</option>
              <option>Outros</option>
            </select>
          </div>

          <div class="pwa-field">
            <label class="pwa-label">Conta</label>
            <input class="pwa-input" type="text" id="f-account" placeholder="Ex: Itaú, Bradesco..."/>
          </div>

          <div class="pwa-field">
            <label class="pwa-label">Observações (opcional)</label>
            <textarea class="pwa-input" id="f-notes" rows="3" placeholder="Detalhes adicionais..." style="resize:none"></textarea>
          </div>

          <button class="pwa-submit" id="btn-submit" onclick="submitEntry()">Enviar para aprovação</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ SCREEN 3: HISTÓRICO ═══ -->
  <div class="screen" id="screen-history">
    <div class="pwa-header">
      <div>
        <div class="pwa-header-title">Histórico</div>
        <div class="pwa-header-sub">Últimos 30 lançamentos</div>
      </div>
      <button class="pwa-back" onclick="goBack()">‹</button>
    </div>
    <div class="pwa-scroll" id="history-scroll">
      <div id="history-list"><div class="pwa-loading">Carregando...</div></div>
    </div>
  </div>

</div>

<div id="toast" class="pwa-toast"></div>

<script>
/* ─── CONFIG ─────────────────────────────────────────────────── */
const SB_URL  = 'https://lruqphwlcimzcqpafjrn.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxydXFwaHdsY2ltemNxcGFmanJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MTI2ODcsImV4cCI6MjA5MDQ4ODY4N30.uPEAdV2rKcZ7SuXC6A_KH3Ili6fq72ytsReRZEXijWQ';
const HEADERS = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
const TABLE   = SB_URL + '/rest/v1/cash_flow_entries';
const QUEUE_KEY = 'fo_queue';

/* ─── STATE ──────────────────────────────────────────────────── */
let currentType = 'expense';
let screenHistory = ['screen-dashboard'];

/* ─── NAVIGATION ─────────────────────────────────────────────── */
function goTo(id) {
  const cur = document.querySelector('.screen.active');
  if (cur) { cur.classList.remove('active'); cur.classList.add('slide-back'); setTimeout(() => cur.classList.remove('slide-back'), 300); }
  const next = document.getElementById(id);
  next.classList.add('active');
  screenHistory.push(id);
  if (id === 'screen-history') loadHistory();
  if (id === 'screen-dashboard') loadDashboard();
}

function goBack() {
  screenHistory.pop();
  const prev = screenHistory[screenHistory.length - 1] || 'screen-dashboard';
  const cur = document.querySelector('.screen.active');
  if (cur) cur.classList.remove('active');
  document.getElementById(prev).classList.add('active');
  if (prev === 'screen-dashboard') loadDashboard();
}

/* ─── TYPE TOGGLE ────────────────────────────────────────────── */
function setType(t) {
  currentType = t;
  document.getElementById('btn-expense').classList.toggle('active', t === 'expense');
  document.getElementById('btn-expense').classList.toggle('expense', t === 'expense');
  document.getElementById('btn-income').classList.toggle('active', t === 'income');
  document.getElementById('btn-income').classList.toggle('income', t === 'income');
}

/* ─── SUPABASE FETCH ─────────────────────────────────────────── */
async function sbFetch(url, opts = {}) {
  try {
    const r = await fetch(url, { headers: HEADERS, ...opts });
    if (!r.ok) { const e = await r.text(); throw new Error(e); }
    const ct = r.headers.get('content-type') || '';
    return ct.includes('json') ? r.json() : [];
  } catch(e) {
    console.error('Supabase error:', e);
    throw e;
  }
}

/* ─── DASHBOARD ──────────────────────────────────────────────── */
async function loadDashboard() {
  const now = new Date();
  const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0');
  const from = `${y}-${m}-01`, to = `${y}-${m}-31`;

  try {
    const data = await sbFetch(`${TABLE}?date=gte.${from}&date=lte.${to}&order=date.desc`);
    const approved = data.filter(e => e.status === 'approved');
    const pending  = data.filter(e => e.status === 'pending');

    const income  = approved.filter(e => e.type === 'income').reduce((s,e) => s + +e.amount, 0);
    const expense = approved.filter(e => e.type === 'expense').reduce((s,e) => s + +e.amount, 0);
    const total   = income - expense;

    document.getElementById('m-total').textContent   = fmt(Math.abs(total));
    document.getElementById('m-income').textContent  = fmt(income);
    document.getElementById('m-expense').textContent = fmt(expense);
    document.getElementById('pending-count').textContent = pending.length;

    const recent = data.slice(0, 5);
    const rl = document.getElementById('recent-list');
    if (!recent.length) { rl.innerHTML = '<div class="pwa-empty">Nenhum lançamento este mês</div>'; return; }
    rl.innerHTML = recent.map(e => entryRow(e)).join('');
  } catch(err) {
    document.getElementById('recent-list').innerHTML = '<div class="pwa-empty">Erro ao carregar dados</div>';
  }
}

/* ─── HISTORY ────────────────────────────────────────────────── */
async function loadHistory() {
  const hl = document.getElementById('history-list');
  hl.innerHTML = '<div class="pwa-loading">Carregando...</div>';
  try {
    const data = await sbFetch(`${TABLE}?order=date.desc&limit=30`);
    if (!data.length) { hl.innerHTML = '<div class="pwa-empty">Nenhum lançamento encontrado</div>'; return; }
    hl.innerHTML = data.map(e => entryRow(e)).join('');
  } catch(err) {
    hl.innerHTML = '<div class="pwa-empty">Erro ao carregar histórico</div>';
  }
}

/* ─── ENTRY ROW ──────────────────────────────────────────────── */
function entryRow(e) {
  const d = new Date(e.date + 'T12:00:00');
  const dateStr = d.toLocaleDateString('pt-BR', { day:'2-digit', month:'short' });
  const amtClass = e.type === 'income' ? 'income' : 'expense';
  const amtSign  = e.type === 'income' ? '+' : '-';
  const statusLabel = { pending:'Pendente', approved:'Aprovado', rejected:'Rejeitado' }[e.status] || e.status;
  return `<div class="pwa-entry glass">
    <div class="pwa-entry-left">
      <div class="pwa-entry-date">${dateStr}</div>
      <div class="pwa-entry-desc">${e.description}</div>
      ${e.category ? `<span class="pwa-entry-cat">${e.category}</span>` : ''}
    </div>
    <div class="pwa-entry-right">
      <div class="pwa-entry-amount ${amtClass}">${amtSign}${fmt(e.amount)}</div>
      <div class="pwa-entry-status status-${e.status}">${statusLabel}</div>
    </div>
  </div>`;
}

/* ─── SUBMIT ─────────────────────────────────────────────────── */
async function submitEntry() {
  const amount = parseFloat(document.getElementById('f-amount').value);
  const desc   = document.getElementById('f-desc').value.trim();
  const date   = document.getElementById('f-date').value;

  if (!amount || amount <= 0) { toast('Informe um valor válido'); return; }
  if (!desc)   { toast('Informe uma descrição'); return; }
  if (!date)   { toast('Informe a data'); return; }

  const entry = {
    amount,
    description: desc,
    date,
    type:     currentType,
    category: document.getElementById('f-category').value || null,
    account:  document.getElementById('f-account').value.trim() || null,
    notes:    document.getElementById('f-notes').value.trim() || null,
    status:   'pending',
    origin:   'mobile'
  };

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  if (!navigator.onLine) {
    const q = JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]');
    q.push(entry);
    localStorage.setItem(QUEUE_KEY, JSON.stringify(q));
    toast('Salvo localmente — será sincronizado ao reconectar');
    resetForm();
    btn.disabled = false;
    btn.textContent = 'Enviar para aprovação';
    goBack();
    return;
  }

  try {
    await sbFetch(TABLE, { method: 'POST', body: JSON.stringify(entry) });
    if (navigator.vibrate) navigator.vibrate(80);
    toast('Lançamento enviado para aprovação');
    resetForm();
    goBack();
  } catch(err) {
    toast('Erro ao enviar — tente novamente');
  }

  btn.disabled = false;
  btn.textContent = 'Enviar para aprovação';
}

/* ─── RESET FORM ─────────────────────────────────────────────── */
function resetForm() {
  document.getElementById('f-amount').value   = '';
  document.getElementById('f-desc').value     = '';
  document.getElementById('f-category').value = '';
  document.getElementById('f-account').value  = '';
  document.getElementById('f-notes').value    = '';
  document.getElementById('f-date').value     = today();
  setType('expense');
}

/* ─── OFFLINE SYNC ───────────────────────────────────────────── */
async function flushQueue() {
  const q = JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]');
  if (!q.length) return;
  const failed = [];
  for (const entry of q) {
    try { await sbFetch(TABLE, { method:'POST', body: JSON.stringify(entry) }); }
    catch(e) { failed.push(entry); }
  }
  localStorage.setItem(QUEUE_KEY, JSON.stringify(failed));
  if (failed.length < q.length) toast(`${q.length - failed.length} lançamento(s) sincronizado(s)`);
}

/* ─── HELPERS ────────────────────────────────────────────────── */
function fmt(v) { return Number(v).toLocaleString('pt-BR', { style:'currency', currency:'BRL' }); }
function today() { return new Date().toISOString().split('T')[0]; }

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

/* ─── INIT ───────────────────────────────────────────────────── */
document.getElementById('header-date').textContent =
  new Date().toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long' });

document.getElementById('f-date').value = today();

window.addEventListener('online',  () => { document.getElementById('offline-bar').classList.remove('show'); flushQueue(); });
window.addEventListener('offline', () => { document.getElementById('offline-bar').classList.add('show'); });
if (!navigator.onLine) document.getElementById('offline-bar').classList.add('show');

loadDashboard();

/* ─── PWA MANIFEST ───────────────────────────────────────────── */
const manifest = {
  name: 'Family Office', short_name: 'FO Cash',
  display: 'standalone', background_color: '#080808', theme_color: '#d4a827',
  start_url: './',
  icons: [{ src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%23080808'/%3E%3Ctext x='96' y='130' font-family='Georgia,serif' font-size='90' fill='%23e8c96a' text-anchor='middle'%3EFO%3C/text%3E%3C/svg%3E", sizes:'192x192', type:'image/svg+xml' }]
};
const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const link = document.createElement('link');
link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
document.head.appendChild(link);

/* ─── SERVICE WORKER ─────────────────────────────────────────── */
if ('serviceWorker' in navigator) {
  const sw = `
    const CACHE = 'fo-v1';
    self.addEventListener('install', e => { e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', './index.html']))); self.skipWaiting(); });
    self.addEventListener('activate', e => { e.waitUntil(caches.keys().then(ks => Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k))))); });
    self.addEventListener('fetch', e => {
      if (e.request.url.includes('supabase.co')) {
        e.respondWith(fetch(e.request).catch(() => new Response(JSON.stringify({error:'offline'}), {headers:{'Content-Type':'application/json'}})));
        return;
      }
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const swBlob = new Blob([sw], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
}
</script>
