<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FO Cash"/>
<meta name="theme-color" content="#d4a827"/>
<title>Family Office</title>
<link rel="apple-touch-icon" href="logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --gold-100: #f5e6b8;
  --gold-200: #e8c96a;
  --gold-300: #d4a827;
  --gold-400: #b8891a;
  --black-deep: #12110d;
  --black-soft: #161616;
  --glass-bg: rgba(255, 250, 235, 0.10);
  --glass-bg-card: rgba(255, 248, 220, 0.13);
  --glass-border: rgba(212, 168, 39, 0.28);
  --glass-border-hover: rgba(212, 168, 39, 0.58);
  --text-primary: #fdf6e3;
  --text-secondary: rgba(253, 246, 227, 0.70);
  --text-muted: rgba(253, 246, 227, 0.42);
  --text-dim: rgba(253, 246, 227, 0.25);
  --ok: #4ade80;
  --danger: #f87171;
  --radius: 20px;
  --radius-sm: 14px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --font-d: 'Cormorant Garamond', Georgia, serif;
  --font-b: 'Montserrat', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--black-deep); font-family: var(--font-b); color: var(--text-primary); font-size: 14px; }

/* ── BACKGROUND ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 20% 20%, rgba(184,137,26,0.15) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(212,168,39,0.1) 0%, transparent 50%),
              linear-gradient(rgba(18,15,8,0.55), rgba(18,15,8,0.55));
  pointer-events: none;
}

/* ── APP SHELL ── */
#app { position: fixed; inset: 0; z-index: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── SCREENS ── */
.screen { position: absolute; inset: 0; display: flex; flex-direction: column; overflow: hidden; opacity: 0; pointer-events: none; transform: translateX(30px); transition: opacity 0.28s ease, transform 0.28s ease; }
.screen.active { opacity: 1; pointer-events: all; transform: translateX(0); }
.screen.slide-back { transform: translateX(-30px); }

/* ── HEADER ── */
.pwa-header {
  padding: calc(var(--safe-top) + 18px) 20px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 0.5px solid var(--glass-border);
  background: rgba(18,17,13,0.85);
  backdrop-filter: blur(28px) saturate(1.8);
  -webkit-backdrop-filter: blur(28px) saturate(1.8);
  flex-shrink: 0;
}
.pwa-logo-box { display: flex; align-items: center; }
.pwa-logo-img { height: 44px; width: auto; object-fit: contain; margin-right: 14px; }
.pwa-header-title { font-family: var(--font-d); font-size: 26px; font-weight: 400; color: var(--gold-200); letter-spacing: 0.04em; }
.pwa-header-sub { font-size: 10px; color: var(--text-secondary); letter-spacing: 0.1em; margin-top: 2px; }
.pwa-back { background: none; border: 0.5px solid var(--glass-border); border-radius: 50%; width: 36px; height: 36px; color: var(--gold-200); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
.pwa-back:active { background: rgba(212,168,39,0.1); }

/* ── SCROLL AREA ── */
.pwa-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px 16px calc(var(--safe-bottom) + 100px); }

/* ── GLASS CARD ── */
.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(28px) saturate(1.8);
  -webkit-backdrop-filter: blur(28px) saturate(1.8);
  border: 0.5px solid var(--glass-border);
  border-radius: var(--radius);
  box-shadow: inset 0 0.5px 0 rgba(255,248,220,0.10), 0 2px 24px rgba(0,0,0,0.25);
  transition: border-color 0.3s ease;
}
.glass:hover { border-color: var(--glass-border-hover); }

/* ── METRIC CARDS ── */
.pwa-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.pwa-metric { padding: 18px; position: relative; overflow: hidden; }
.pwa-metric.full { grid-column: 1/-1; }
.pwa-metric::before { content: ''; position: absolute; top: 0; left: 0; width: 2px; height: 100%; background: linear-gradient(180deg, var(--gold-200), transparent); opacity: 0.6; }
.pwa-metric-label { font-size: 10px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; }
.pwa-metric-value { font-family: var(--font-d); font-size: 30px; font-weight: 400; color: var(--gold-100); line-height: 1; }
.pwa-metric-sub { font-size: 9px; color: var(--text-muted); margin-top: 4px; }

/* ── PENDING BUTTON ── */
.pwa-pending-btn {
  width: 100%; padding: 16px 20px; margin-bottom: 20px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; border: none; text-align: left;
  background: rgba(184,137,26,0.12);
  border: 0.5px solid rgba(184,137,26,0.4);
  border-radius: var(--radius-sm);
  transition: transform 0.15s ease;
}
.pwa-pending-btn:active { transform: scale(0.98); }
.pwa-pending-label { font-size: 12px; color: var(--gold-200); letter-spacing: 0.08em; }
.pwa-pending-count { font-family: var(--font-d); font-size: 26px; color: var(--gold-300); font-weight: 500; }

/* ── FAB & ACTIONS ── */
.pwa-actions-group {
  position: fixed;
  right: 20px;
  bottom: calc(var(--safe-bottom) + 24px);
  display: flex; align-items: center; gap: 12px;
  z-index: 100;
}
.pwa-btn-cc {
  height: 52px; padding: 0 20px;
  border-radius: 26px;
  background: transparent;
  border: 1px solid var(--gold-300);
  color: var(--gold-200);
  font-family: var(--font-b);
  font-size: 13px; font-weight: 600; letter-spacing: 0.06em;
  display: flex; align-items: center; gap: 8px;
  backdrop-filter: blur(8px);
  transition: all 0.2s;
}
.pwa-btn-cc:active { background: rgba(212,168,39,0.1); transform: scale(0.95); }

.pwa-fab {
  width: 58px; height: 58px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-300), var(--gold-400));
  border: none;
  font-size: 28px; color: #000;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 32px rgba(212,168,39,0.4);
  transition: all 0.2s;
}
.pwa-fab:active { transform: scale(0.92); filter: brightness(1.15); }

/* ── FORM ── */
.pwa-form { display: flex; flex-direction: column; gap: 16px; }
.pwa-field { display: flex; flex-direction: column; gap: 8px; }
.pwa-label { font-size: 10px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-secondary); }
.pwa-input {
  background: rgba(255, 248, 220, 0.07);
  border: 0.5px solid rgba(212, 168, 39, 0.30);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font-b);
  font-size: 15px;
  padding: 14px 16px;
  width: 100%;
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.2s;
}
.pwa-input:focus { border-color: var(--gold-300); background: rgba(255, 248, 220, 0.10); }
.pwa-input option { background: #1a1a0e; color: #fff; }

/* ── TYPE TOGGLE ── */
.pwa-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-radius: var(--radius-sm); overflow: hidden; border: 0.5px solid var(--glass-border); }
.pwa-toggle-btn { padding: 14px; border: none; background: transparent; color: var(--text-muted); font-family: var(--font-b); font-size: 13px; font-weight: 600; letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s; }
.pwa-toggle-btn.active.income { background: rgba(74,222,128,0.15); color: var(--ok); }
.pwa-toggle-btn.active.expense { background: rgba(248,113,113,0.15); color: var(--danger); }

/* ── SUBMIT BTN ── */
.pwa-submit {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, var(--gold-300), var(--gold-400));
  border: none; border-radius: var(--radius-sm);
  color: #000; font-family: var(--font-b);
  font-size: 14px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer; margin-top: 8px;
  transition: all 0.2s;
}
.pwa-submit:active { transform: translateY(1px); filter: brightness(1.2); }
.pwa-submit:disabled { opacity: 0.4; }

/* ── HISTORY LIST ── */
.pwa-entry {
  padding: 16px 18px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 14px;
  position: relative;
}
.pwa-entry-left { flex: 1; min-width: 0; }
.pwa-entry-date { font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; margin-bottom: 4px; }
.pwa-entry-desc { font-size: 14px; color: var(--text-primary); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pwa-entry-cat { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 8px; border-radius: 99px; margin-top: 6px; background: rgba(212,168,39,0.12); color: var(--gold-200); border: 0.5px solid rgba(212,168,39,0.3); }
.pwa-entry-right { text-align: right; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; }
.pwa-entry-amount { font-family: var(--font-d); font-size: 20px; font-weight: 500; }
.pwa-entry-amount.income { color: var(--ok); }
.pwa-entry-amount.expense { color: var(--danger); }
.pwa-entry-status { font-size: 10px; margin-top: 4px; letter-spacing: 0.08em; transition: opacity 0.4s ease; }
.status-pending  { color: var(--gold-200); }
.status-approved, .status-posted { color: var(--ok); }
.status-rejected { color: var(--danger); }

/* ── EDIT BUTTON ── */
.pwa-edit-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 0.5px solid var(--glass-border);
  background: transparent;
  color: var(--gold-200);
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  margin-left: 12px; transition: all 0.2s;
}
.pwa-edit-btn:active { background: rgba(212,168,39,0.2); border-color: var(--gold-300); }

/* ── TOAST ── */
.pwa-toast {
  position: fixed; bottom: calc(var(--safe-bottom) + 110px); left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(15,14,11,0.96); border: 0.5px solid var(--gold-300);
  border-radius: var(--radius-sm); padding: 14px 24px;
  font-size: 13px; color: var(--text-primary); letter-spacing: 0.04em;
  opacity: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none;
  white-space: nowrap; z-index: 200;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.pwa-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── OFFLINE BAR ── */
.pwa-offline {
  background: rgba(184,137,26,0.2); border-bottom: 0.5px solid rgba(184,137,26,0.3);
  padding: 10px 16px; font-size: 12px; color: var(--gold-200);
  text-align: center; letter-spacing: 0.08em;
  display: none;
}
.pwa-offline.show { display: block; }

/* ── EMPTY STATE ── */
.pwa-empty { text-align: center; padding: 64px 24px; color: var(--text-muted); font-size: 14px; letter-spacing: 0.06em; }

/* ── SECTION LABEL ── */
.pwa-section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 12px; margin-top: 6px; }

/* ── LOADING ── */
.pwa-loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; letter-spacing: 0.12em; }
</style>
</head>
<body>

<div id="offline-bar" class="pwa-offline">Sem conexão — sincronizando ao reconectar</div>

<div id="app">

  <!-- ═══ SCREEN 1: DASHBOARD ═══ -->
  <div class="screen active" id="screen-dashboard">
    <div class="pwa-header">
      <div class="pwa-logo-box">
        <img src="logo.png" class="pwa-logo-img" alt="Logo"/>
        <div>
          <div class="pwa-header-title">Family Office</div>
          <div class="pwa-header-sub" id="header-date"></div>
        </div>
      </div>
    </div>
    <div class="pwa-scroll">
      <div class="pwa-section-label">Resumo do mês</div>
      <div class="pwa-metrics">
        <div class="pwa-metric glass full">
          <div class="pwa-metric-label">Total lançado</div>
          <div class="pwa-metric-value" id="m-total">R$ 0</div>
          <div class="pwa-metric-sub">entradas aprovadas</div>
        </div>
        <div class="pwa-metric glass">
          <div class="pwa-metric-label">Receitas</div>
          <div class="pwa-metric-value" id="m-income" style="color:#4ade80">R$ 0</div>
        </div>
        <div class="pwa-metric glass">
          <div class="pwa-metric-label">Despesas</div>
          <div class="pwa-metric-value" id="m-expense" style="color:#f87171">R$ 0</div>
        </div>
      </div>

      <button class="pwa-pending-btn glass" id="btn-pending" onclick="goTo('screen-history')">
        <div>
          <div class="pwa-pending-label">Aguardando aprovação</div>
          <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">Toque para ver o histórico</div>
        </div>
        <div class="pwa-pending-count" id="pending-count">0</div>
      </button>

      <div class="pwa-section-label">Últimos lançamentos</div>
      <div id="recent-list"><div class="pwa-loading">Carregando...</div></div>
    </div>
    <div class="pwa-actions-group">
      <button class="pwa-btn-cc" onclick="goTo('screen-card-new')">
        <i style="font-style:normal">💳</i> Cartão
      </button>
      <button class="pwa-fab" onclick="goTo('screen-new')">+</button>
    </div>
  </div>

  <!-- ═══ SCREEN 2: NOVO LANÇAMENTO ═══ -->
  <div class="screen" id="screen-new">
    <div class="pwa-header">
      <div>
        <div class="pwa-header-title" id="form-title">Novo Lançamento</div>
        <div class="pwa-header-sub">Fluxo de caixa</div>
      </div>
      <button class="pwa-back" onclick="goBack()">‹</button>
    </div>
    <div class="pwa-scroll">
      <div class="glass" style="padding:24px">
        <div class="pwa-form">
          <div class="pwa-field">
            <label class="pwa-label">Tipo</label>
            <div class="pwa-toggle">
              <button class="pwa-toggle-btn active expense" id="btn-expense" onclick="setType('expense')">Despesa</button>
              <button class="pwa-toggle-btn income" id="btn-income" onclick="setType('income')">Receita</button>
            </div>
          </div>
          <div class="pwa-field">
            <label class="pwa-label">Valor (R$)</label>
            <input class="pwa-input" type="number" id="f-amount" inputmode="decimal" placeholder="0,00" step="0.01" min="0"/>
          </div>
          <div class="pwa-field">
            <label class="pwa-label">Descrição</label>
            <input class="pwa-input" type="text" id="f-desc" placeholder="Ex: Supermercado, Salário..."/>
          </div>
          <div class="pwa-field">
            <label class="pwa-label">Data</label>
            <input class="pwa-input" type="date" id="f-date"/>
          </div>
          <div class="pwa-field">
            <label class="pwa-label">Categoria</label>
            <select class="pwa-input" id="f-category">
              <option value="">Selecione...</option>
              <option>Alimentação</option>
              <option>Moradia</option>
              <option>Transporte</option>
              <option>Saúde</option>
              <option>Educação</option>
              <option>Lazer</option>
              <option>Viagem</option>
              <option>Investimento</option>
              <option>Receita</option>
              <option>Outros</option>
            </select>
          </div>
          <div class="pwa-field">
            <label class="pwa-label">Conta</label>
            <input class="pwa-input" type="text" id="f-account" placeholder="Ex: Itaú, Bradesco..."/>
          </div>
          <div class="pwa-field">
            <label class="pwa-label">Observações (opcional)</label>
            <textarea class="pwa-input" id="f-notes" rows="3" placeholder="Detalhes adicionais..." style="resize:none"></textarea>
          </div>
          <button class="pwa-submit" id="btn-submit" onclick="submitEntry()">Enviar para aprovação</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ SCREEN 3: HISTÓRICO ═══ -->
  <div class="screen" id="screen-history">
    <div class="pwa-header">
      <div>
        <div class="pwa-header-title">Histórico</div>
        <div class="pwa-header-sub">Sincronizado em tempo real</div>
      </div>
      <button class="pwa-back" onclick="goBack()">‹</button>
    </div>
    <div class="pwa-scroll" id="history-scroll">
      <div id="history-list"><div class="pwa-loading">Carregando...</div></div>
    </div>
  </div>

  <!-- ═══ SCREEN 4: LANÇAMENTO DE CARTÃO ═══ -->
  <div class="screen" id="screen-card-new">
    <div class="pwa-header">
      <div>
        <div class="pwa-header-title">Lançamento de Cartão</div>
        <div class="pwa-header-sub">Módulo independente</div>
      </div>
      <button class="pwa-back" onclick="goBack()">‹</button>
    </div>
    <div class="pwa-scroll">
      <div class="glass" style="padding:24px">
        <div class="pwa-form">
          <div class="pwa-field">
            <label class="pwa-label">Cartão</label>
            <select class="pwa-input" id="f-card">
              <option value="">Carregando...</option>
            </select>
          </div>
          <div class="pwa-field">
            <label class="pwa-label">Data da Compra</label>
            <input class="pwa-input" type="date" id="f-date" oninput="updateInstallmentPreview()"/>
          </div>
          <div class="pwa-field">
            <label class="pwa-label">Descrição</label>
            <input class="pwa-input" type="text" id="f-card-desc" placeholder="Ex: Restaurante Japa, Amazon..."/>
          </div>
          <div class="pwa-field">
            <label class="pwa-label">Valor total (R$)</label>
            <input class="pwa-input" type="number" id="f-card-amount" inputmode="decimal" placeholder="0,00" step="0.01" oninput="updateInstallmentPreview()"/>
          </div>
          <div class="pwa-field">
            <label class="pwa-label">Parcelas</label>
            <select id="f-installments" class="pwa-input" onchange="updateInstallmentPreview()">
              ${Array.from({length:24},(_,i)=> `<option value="${i+1}">${i+1}x</option>`).join('')}
            </select>
            <div id="installment-preview" style="font-size:12px; color:var(--gold-200); margin-top:6px; min-height:18px;"></div>
          </div>
          <div class="pwa-field">
            <label class="pwa-label">Observações (opcional)</label>
            <textarea class="pwa-input" id="f-card-notes" rows="2" placeholder="Notas sobre este gasto..." style="resize:none"></textarea>
          </div>
          <button class="pwa-submit" id="btn-card-submit" onclick="submitCardEntry()">Lançar no cartão</button>
        </div>
      </div>
    </div>
  </div>

</div>

<div id="toast" class="pwa-toast"></div>

<script>
/* ─── CONFIG ─────────────────────────────────────────────────── */
const SB_URL = 'https://lruqphwlcimzcqpafjrn.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxydXFwaHdsY2ltemNxcGFmanJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MTI2ODcsImV4cCI6MjA5MDQ4ODY4N30.uPEAdV2rKcZ7SuXC6A_KH3Ili6fq72ytsReRZEXijWQ';
const HEADERS = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
const TABLE   = SB_URL + '/rest/v1/cash_flow_entries';
const CARDS_TABLE = SB_URL + '/rest/v1/cards';
const CARD_TX_TABLE = SB_URL + '/rest/v1/card_transactions';
const QUEUE_KEY = 'fo_queue';
const CARD_QUEUE_KEY = 'fo_card_queue';

/* ─── STATE ──────────────────────────────────────────────────── */
let currentType = 'expense';
let screenHistory = ['screen-dashboard'];
let editingId = null;
let realtimeSocket = null;
let rtRetryCount = 0;

/* ─── NAVIGATION ─────────────────────────────────────────────── */
function goTo(id) {
  const cur = document.querySelector('.screen.active');
  if (cur) { cur.classList.remove('active'); cur.classList.add('slide-back'); setTimeout(() => cur.classList.remove('slide-back'), 300); }
  const next = document.getElementById(id);
  next.classList.add('active');
  screenHistory.push(id);
  
  if (id === 'screen-history') { loadHistory(); setupRealtimeSync(); }
  if (id === 'screen-dashboard') { loadDashboard(); closeRealtimeSync(); }
  if (id === 'screen-card-new') { loadCards(); document.getElementById('f-date').value = today(); }
}

function goBack() {
  if (editingId) { editingId = null; resetForm(); document.getElementById('btn-submit').textContent = 'Enviar para aprovação'; document.getElementById('form-title').textContent = 'Novo Lançamento'; }
  screenHistory.pop();
  const prev = screenHistory[screenHistory.length - 1] || 'screen-dashboard';
  const cur = document.querySelector('.screen.active');
  if (cur) cur.classList.remove('active');
  document.getElementById(prev).classList.add('active');
  if (prev === 'screen-dashboard') loadDashboard();
  if (prev !== 'screen-history') closeRealtimeSync();
}

/* ─── TYPE TOGGLE ────────────────────────────────────────────── */
function setType(t) {
  currentType = t;
  document.getElementById('btn-expense').classList.toggle('active', t === 'expense');
  document.getElementById('btn-expense').classList.toggle('expense', t === 'expense');
  document.getElementById('btn-income').classList.toggle('active', t === 'income');
  document.getElementById('btn-income').classList.toggle('income', t === 'income');
}

/* ─── SUPABASE FETCH ─────────────────────────────────────────── */
async function sbFetch(url, opts = {}) {
  try {
    const r = await fetch(url, { headers: HEADERS, ...opts });
    if (!r.ok) { const e = await r.text(); throw new Error(e); }
    const ct = r.headers.get('content-type') || '';
    return ct.includes('json') ? r.json() : [];
  } catch(e) {
    console.error('Supabase error:', e);
    throw e;
  }
}

/* ─── DASHBOARD ──────────────────────────────────────────────── */
async function loadDashboard() {
  const now = new Date();
  const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0');
  const from = `${y}-${m}-01`, to = `${y}-${m}-31`;

  try {
    const data = await sbFetch(`${TABLE}?date=gte.${from}&date=lte.${to}&order=date.desc`);
    const approved = data.filter(e => e.status === 'approved');
    const pending  = data.filter(e => e.status === 'pending');

    const income  = approved.filter(e => e.type === 'income').reduce((s,e) => s + +e.amount, 0);
    const expense = approved.filter(e => e.type === 'expense').reduce((s,e) => s + +e.amount, 0);
    const total   = income - expense;

    document.getElementById('m-total').textContent   = fmt(Math.abs(total));
    document.getElementById('m-income').textContent  = fmt(income);
    document.getElementById('m-expense').textContent = fmt(expense);
    document.getElementById('pending-count').textContent = pending.length;

    const recent = data.slice(0, 5);
    const rl = document.getElementById('recent-list');
    if (!recent.length) { rl.innerHTML = '<div class="pwa-empty">Nenhum lançamento este mês</div>'; return; }
    rl.innerHTML = recent.map(e => entryRow(e)).join('');
  } catch(err) {
    document.getElementById('recent-list').innerHTML = '<div class="pwa-empty">Erro ao carregar dados</div>';
  }
}

/* ─── HISTORY ────────────────────────────────────────────────── */
async function loadHistory() {
  const hl = document.getElementById('history-list');
  hl.innerHTML = '<div class="pwa-loading">Carregando...</div>';
  try {
    const data = await sbFetch(`${TABLE}?order=date.desc&limit=30`);
    if (!data.length) { hl.innerHTML = '<div class="pwa-empty">Nenhum lançamento encontrado</div>'; return; }
    hl.innerHTML = data.map(e => entryRow(e)).join('');
  } catch(err) {
    hl.innerHTML = '<div class="pwa-empty">Erro ao carregar histórico</div>';
  }
}

/* ─── ENTRY ROW ──────────────────────────────────────────────── */
function entryRow(e) {
  const d = new Date(e.date + 'T12:00:00');
  const dateStr = d.toLocaleDateString('pt-BR', { day:'2-digit', month:'short' });
  const amtClass = e.type === 'income' ? 'income' : 'expense';
  const amtSign  = e.type === 'income' ? '+' : '-';
  const statusLabel = { pending:'Aguardando aprovação', approved:'Lançado', rejected:'Rejeitado pelo adm', posted:'Lançado' }[e.status] || e.status;
  
  const editBtn = e.status === 'pending' ? `<button class="pwa-edit-btn" onclick='editEntry(${JSON.stringify(e)})'>✎</button>` : '';

  return `<div class="pwa-entry glass" data-id="${e.id}">
    <div class="pwa-entry-left">
      <div class="pwa-entry-date">${dateStr}</div>
      <div class="pwa-entry-desc">${e.description}</div>
      ${e.category ? `<span class="pwa-entry-cat">${e.category}</span>` : ''}
    </div>
    <div class="pwa-entry-right">
      <div class="pwa-entry-amount ${amtClass}">${amtSign}${fmt(e.amount)}</div>
      <div class="pwa-entry-status status-${e.status}">${statusLabel}</div>
    </div>
    ${editBtn}
  </div>`;
}

function editEntry(e) {
  editingId = e.id;
  document.getElementById('f-amount').value = e.amount;
  document.getElementById('f-desc').value = e.description;
  document.getElementById('f-date').value = e.date;
  document.getElementById('f-category').value = e.category || '';
  document.getElementById('f-account').value = e.account || '';
  document.getElementById('f-notes').value = e.notes || '';
  setType(e.type);
  
  document.getElementById('btn-submit').textContent = 'Salvar alterações';
  document.getElementById('form-title').textContent = 'Editar Lançamento';
  goTo('screen-new');
}

/* ─── SUBMIT ─────────────────────────────────────────────────── */
async function submitEntry() {
  const amount = parseFloat(document.getElementById('f-amount').value);
  const desc   = document.getElementById('f-desc').value.trim();
  const date   = document.getElementById('f-date').value;

  if (!amount || amount <= 0) { toast('Informe um valor válido'); return; }
  if (!desc)   { toast('Informe uma descrição'); return; }
  if (!date)   { toast('Informe a data'); return; }

  const entry = {
    amount,
    description: desc,
    date,
    type:     currentType,
    category: document.getElementById('f-category').value || null,
    account:  document.getElementById('f-account').value.trim() || null,
    notes:    document.getElementById('f-notes').value.trim() || null,
    status:   'pending',
    origin:   'mobile'
  };

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  if (!navigator.onLine) {
    const q = JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]');
    if (editingId) {
      q.push({ ...entry, id: editingId, _method: 'PATCH' });
    } else {
      q.push(entry);
    }
    localStorage.setItem(QUEUE_KEY, JSON.stringify(q));
    toast('Salvo localmente — sincronizando ao reconectar');
    resetForm();
    editingId = null;
    btn.disabled = false;
    btn.textContent = 'Enviar para aprovação';
    goBack();
    return;
  }

  try {
    if (editingId) {
      await sbFetch(`${TABLE}?id=eq.${editingId}`, { method: 'PATCH', body: JSON.stringify(entry) });
      toast('Lançamento atualizado');
      editingId = null;
    } else {
      await sbFetch(TABLE, { method: 'POST', body: JSON.stringify(entry) });
      toast('Lançamento enviado para aprovação');
    }
    if (navigator.vibrate) navigator.vibrate(80);
    resetForm();
    btn.textContent = 'Enviar para aprovação';
    document.getElementById('form-title').textContent = 'Novo Lançamento';
    goBack();
  } catch(err) {
    toast('Erro ao enviar — tente novamente');
  }

  btn.disabled = false;
}

/* ─── CARD LOADING FRAGMENTS ─────────────────────────────────── */
async function loadCards() {
  const select = document.getElementById('f-card');
  select.innerHTML = '<option value="">Carregando...</option>';
  try {
    const data = await sbFetch(
      CARDS_TABLE + '?select=id,name,holder,bank,due_day&order=name.asc'
    );
    if (!data.length) {
      select.innerHTML = '<option value="">Nenhum cartão cadastrado</option>';
      return;
    }
    select.innerHTML = '<option value="">Selecione o cartão...</option>'
      + data.map(c =>
          `<option value="${c.id}" data-due="${c.due_day || 1}">
            ${c.name} — ${c.holder}
          </option>`
        ).join('');
  } catch(e) {
    select.innerHTML = '<option value="">Erro ao carregar cartões</option>';
  }
}

function updateInstallmentPreview() {
  const amount = parseFloat(document.getElementById('f-card-amount').value) || 0;
  const n = parseInt(document.getElementById('f-installments').value) || 1;
  const preview = document.getElementById('installment-preview');
  if (amount > 0 && n > 1) {
    const each = amount / n;
    preview.textContent = each.toLocaleString('pt-BR', {style:'currency',currency:'BRL'}) + ' por parcela';
  } else {
    preview.textContent = '';
  }
}

async function submitCardEntry() {
  const cardSelect = document.getElementById('f-card');
  const cardId     = cardSelect.value;
  const dueDay     = parseInt(cardSelect.selectedOptions[0]?.dataset.due || '1');
  const amount      = parseFloat(document.getElementById('f-card-amount').value);
  const n           = parseInt(document.getElementById('f-installments').value) || 1;
  const description = document.getElementById('f-card-desc').value.trim();
  const purchaseDate = document.getElementById('f-date').value;
  const notes        = document.getElementById('f-card-notes').value.trim() || null;

  if (!cardId)        { toast('Selecione um cartão'); return }
  if (!amount || amount <= 0) { toast('Informe um valor válido'); return }
  if (!description)   { toast('Informe a descrição'); return }
  if (!purchaseDate)  { toast('Informe a data'); return }

  const groupId = crypto.randomUUID();
  const each    = parseFloat((amount / n).toFixed(2));
  const btn     = document.getElementById('btn-card-submit');
  btn.disabled  = true;
  btn.textContent = 'Enviando...';

  const records = Array.from({length: n}, (_, i) => {
    const base = new Date(purchaseDate + 'T12:00:00');
    base.setMonth(base.getMonth() + i);
    let due = new Date(base.getFullYear(), base.getMonth(), dueDay);
    if (due < base) due.setMonth(due.getMonth() + 1);
    const dueDateStr = due.toISOString().split('T')[0];

    return {
      card_id: cardId,
      purchase_date: purchaseDate,
      date: dueDateStr,
      due_date: dueDateStr,
      description: n > 1 ? `${description} (${i+1}/${n})` : description,
      amount: each,
      installments: n,
      installment_current: i + 1,
      installment_group_id: groupId,
      status: 'pending',
      origin: 'mobile',
      notes: notes
    }
  });

  const failed = [];
  for (const record of records) {
    if (!navigator.onLine) {
      failed.push(record);
      continue;
    }
    try {
      await sbFetch(CARD_TX_TABLE, { method: 'POST', body: JSON.stringify(record) });
    } catch(e) {
      failed.push(record);
    }
  }

  if (failed.length === 0) {
    if (navigator.vibrate) navigator.vibrate(80);
    toast(n > 1 ? `${n} parcelas lançadas no cartão` : 'Gasto lançado no cartão');
    resetCardForm();
    goBack();
  } else if (failed.length < n) {
    toast(`${n - failed.length}/${n} parcelas enviadas — restantes salvas offline`);
    failed.forEach(r => queueCardRecord(r));
    resetCardForm();
    goBack();
  } else {
    toast('Sem conexão — parcelas salvas para sincronizar');
    records.forEach(r => queueCardRecord(r));
    resetCardForm();
    goBack();
  }

  btn.disabled = false;
  btn.textContent = 'Lançar no cartão';
}

function queueCardRecord(record) {
  const q = JSON.parse(localStorage.getItem('fo_card_queue') || '[]');
  q.push(record);
  localStorage.setItem('fo_card_queue', JSON.stringify(q));
}

function resetCardForm() {
  document.getElementById('f-card-amount').value = '';
  document.getElementById('f-card-desc').value = '';
  document.getElementById('f-card-notes').value = '';
  document.getElementById('f-installments').value = '1';
  document.getElementById('installment-preview').textContent = '';
}

/* ─── REALTIME SYNC ──────────────────────────────────────────── */
function setupRealtimeSync() {
  if (realtimeSocket) return;
  const wsUrl = `wss://${new URL(SB_URL).hostname}/realtime/v1/websocket?apikey=${SB_KEY}&vsn=1.0.0`;
  realtimeSocket = new WebSocket(wsUrl);

  realtimeSocket.onopen = () => {
    rtRetryCount = 0;
    realtimeSocket.send(JSON.stringify({ topic:'realtime:public:cash_flow_entries', event:'phx_join', payload:{}, ref:'1' }));
  };

  realtimeSocket.onmessage = (msg) => {
    const data = JSON.parse(msg.data);
    if (data.event === 'UPDATE' || (data.payload && data.payload.type === 'UPDATE')) {
      const record = data.payload?.record || data.payload?.data?.record;
      if (record) {
        const row = document.querySelector(`.pwa-entry[data-id="${record.id}"]`);
        if (row) {
          const badge = row.querySelector('.pwa-entry-status');
          const mapping = { pending:'Aguardando aprovação', approved:'Lançado', rejected:'Rejeitado pelo adm', posted:'Lançado' };
          badge.style.opacity = '0';
          setTimeout(() => {
            badge.textContent = mapping[record.status] || record.status;
            badge.className = `pwa-entry-status status-${record.status}`;
            badge.style.opacity = '1';
            if (record.status !== 'pending') row.querySelector('.pwa-edit-btn')?.remove();
          }, 400);
        }
      }
    }
  };

  realtimeSocket.onclose = () => {
    realtimeSocket = null;
    const delay = Math.min(30000, Math.pow(2, rtRetryCount) * 1000);
    rtRetryCount++;
    setTimeout(setupRealtimeSync, delay);
  };
}

function closeRealtimeSync() { if (realtimeSocket) { realtimeSocket.close(); realtimeSocket = null; } }

/* ─── RESET & SYNC ───────────────────────────────────────────── */
function resetForm() {
  document.getElementById('f-amount').value   = '';
  document.getElementById('f-desc').value     = '';
  document.getElementById('f-category').value = '';
  document.getElementById('f-account').value  = '';
  document.getElementById('f-notes').value    = '';
  document.getElementById('f-date').value     = today();
  setType('expense');
}

async function flushQueue() {
  // Cash flow queue
  const q = JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]');
  if (q.length) {
    const failed = [];
    for (const item of q) {
      try {
        const method = item._method || 'POST';
        const url = method === 'PATCH' ? `${TABLE}?id=eq.${item.id}` : TABLE;
        const body = { ...item }; delete body._method;
        await sbFetch(url, { method, body: JSON.stringify(body) });
      } catch(e) { failed.push(item); }
    }
    localStorage.setItem(QUEUE_KEY, JSON.stringify(failed));
  }
  // Card queue
  const cq = JSON.parse(localStorage.getItem('fo_card_queue') || '[]');
  if (cq.length) {
    const cFailed = [];
    for (const item of cq) {
      try { await sbFetch(CARD_TX_TABLE, { method: 'POST', body: JSON.stringify(item) }); }
      catch(e) { cFailed.push(item); }
    }
    localStorage.setItem('fo_card_queue', JSON.stringify(cFailed));
  }
  if (navigator.onLine) toast('Sincronizando dados...');
}

/* ─── HELPERS ────────────────────────────────────────────────── */
function fmt(v) { return Number(v).toLocaleString('pt-BR', { style:'currency', currency:'BRL' }); }
function today() { return new Date().toISOString().split('T')[0]; }

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

/* ─── INIT ───────────────────────────────────────────────────── */
document.getElementById('header-date').textContent = new Date().toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long' });
document.getElementById('f-date').value = today();
window.addEventListener('online', () => { document.getElementById('offline-bar').classList.remove('show'); flushQueue(); });
window.addEventListener('offline', () => { document.getElementById('offline-bar').classList.add('show'); });
if (!navigator.onLine) document.getElementById('offline-bar').classList.add('show');
loadDashboard();
