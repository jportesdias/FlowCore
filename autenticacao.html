<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autenticação de Certificados — FlowCore Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1F3F68;
            --primary-light: #2A5298;
            --accent: #F48A50;
            --accent-dark: #E55B13;
            --bg: #F8F9FA;
            --text: #1F2937;
            --text-muted: #6B7280;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: url('back_aut.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(31, 63, 104, 0.6);
            z-index: 0;
        }

        header {
            position: relative;
            z-index: 1;
            padding: 40px 20px 80px;
            color: var(--white);
            text-align: center;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: -60px auto 40px;
            padding: 0 20px;
            width: 100%;
        }

        .logo-img {
            max-width: 280px;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
        }

        p.subtitle {
            font-size: 18px;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
            text-shadow: 0 1px 5px rgba(0,0,0,0.3);
        }

        .search-box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .search-input-wrapper {
            position: relative;
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            padding: 16px 24px;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(244, 138, 80, 0.1);
        }

        button {
            background-color: var(--primary);
            color: var(--white);
            border: none;
            padding: 0 32px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            background-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(244, 138, 80, 0.2);
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .results-area {
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .certificate-card {
            background: var(--white);
            border-left: 6px solid var(--accent);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .cert-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .cert-badge {
            background: rgba(244, 138, 80, 0.1);
            color: var(--accent-dark);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .cert-name {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .cert-course {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 16px;
        }

        .cert-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            border-top: 1px solid #F3F4F6;
            padding-top: 20px;
        }

        .detail-item p {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .detail-item span {
            font-weight: 600;
            color: var(--primary);
        }

        .error-msg {
            background: #FEE2E2;
            color: #B91C1C;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        footer {
            margin-top: auto;
            padding: 40px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        .loading {
            text-align: center;
            display: none;
            padding: 20px;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(31, 63, 104, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .search-input-wrapper {
                flex-direction: column;
            }
            button {
                padding: 16px;
            }
            h1 { font-size: 26px; }
            .cert-header { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

<header>
    <img src="Flowcore_logo_.png" alt="FlowCore Academy" class="logo-img">
    <h1>Autenticação de Certificados</h1>
    <p class="subtitle">Valide a autenticidade de certificados ou consulte seus códigos de aluno FlowCore.</p>
</header>

<div class="container">
    <div class="search-box">
        <label style="display: block; font-size: 14px; font-weight: 600; color: var(--primary); margin-bottom: 8px;">E-mail do Aluno ou Código do Certificado</label>
        <div class="search-input-wrapper">
            <input type="text" id="searchInput" placeholder="Ex: aluno@email.com ou FCA-ABC123">
            <button id="btnSearch" onclick="buscarCertificado()">Consultar</button>
        </div>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p style="margin-top: 10px; font-size: 14px;">Consultando base de dados...</p>
    </div>

    <div id="errorMsg" class="error-msg"></div>

    <div id="resultsArea" class="results-area"></div>
</div>

<footer>
    <p>&copy; 2026 FlowCore Academy · <a href="https://flowcoresolutions.com.br" style="color: var(--primary); text-decoration: none; font-weight: 600;">flowcoresolutions.com.br</a></p>
</footer>

<script>
    // Substitua pela sua URL do Google Apps Script
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzkLOaVZwu8qURF5SxJnH28e4SnesjnHZ4Ycme-BGBBdXUefh7ytr5GWA0dmDiuF8rs/exec';

    async function buscarCertificado() {
        const query = document.getElementById('searchInput').value.trim();
        const resultsArea = document.getElementById('resultsArea');
        const errorMsg = document.getElementById('errorMsg');
        const loading = document.getElementById('loading');
        const btn = document.getElementById('btnSearch');

        if (!query) return;

        // Reset UI
        resultsArea.innerHTML = '';
        resultsArea.style.display = 'none';
        errorMsg.style.display = 'none';
        loading.style.display = 'block';
        btn.disabled = true;

        try {
            const url = `${GAS_URL}?action=verificar&query=${encodeURIComponent(query)}`;
            
            // Usamos fetch com no-cors se estivéssemos enviando, mas como precisamos da resposta,
            // o Google Apps Script precisa estar configurado para retornar JSONP ou CORS.
            // Nossa lógica atual no GS já suporta JSONP se passarmos o callback.
            
            const response = await fetch(url);
            const data = await response.json();

            loading.style.display = 'none';
            btn.disabled = false;

            if (data.ok) {
                renderResults(data.certificados);
            } else {
                errorMsg.textContent = data.msg;
                errorMsg.style.display = 'block';
            }

        } catch (err) {
            console.error(err);
            loading.style.display = 'none';
            btn.disabled = false;
            errorMsg.textContent = 'Erro ao conectar-se com o servidor. Tente novamente.';
            errorMsg.style.display = 'block';
        }
    }

    function renderResults(certificados) {
        const resultsArea = document.getElementById('resultsArea');
        resultsArea.style.display = 'block';

        certificados.forEach(cert => {
            const card = document.createElement('div');
            card.className = 'certificate-card';
            card.innerHTML = `
                <div class="cert-header">
                    <div>
                        <div class="cert-name">${cert.nome}</div>
                        <div class="cert-course">${cert.curso}</div>
                    </div>
                    <div class="cert-badge">Autêntico</div>
                </div>
                <div class="cert-details">
                    <div class="detail-item">
                        <p>Data de Emissão</p>
                        <span>${cert.data}</span>
                    </div>
                    <div class="detail-item">
                        <p>Carga Horária</p>
                        <span>${cert.carga}h</span>
                    </div>
                    <div class="detail-item">
                        <p>Código de Autenticação</p>
                        <span style="font-family: monospace; letter-spacing: 0.1em; color: var(--accent-dark);">${cert.codigo}</span>
                    </div>
                </div>
            `;
            resultsArea.appendChild(card);
        });
    }

    // Permitir busca com o Enter
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') buscarCertificado();
    });
</script>

</body>
</html>
