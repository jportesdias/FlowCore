<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Prover</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      background-image: url("prover.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      font-family: Georgia, "Times New Roman", serif;
    }

    .overlay {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background: rgba(0, 0, 0, 0.18);
    }

    .card {
      max-width: 760px;
      padding: 32px;
      color: #ffffff;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(6px);
    }

    .card h1 {
      margin-bottom: 12px;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: 0.04em;
    }

    .card p {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="overlay">
    <section class="card">
      <h1>FORMAÇÃO DE TURMA</h1>
      <p>Mande uma mensagem para (21) 98371-0895. Segundo semestre 2026</p>
    </section>
  </main>
</body>
</html>
